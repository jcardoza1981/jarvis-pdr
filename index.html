<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Command - Logistics Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .stark-card { transition: all 0.2s ease-out; }
        .stark-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .stage-btn { white-space: nowrap; transition: all 0.2s; border: 2px solid transparent; }
        .stage-btn.active { background-color: #4f46e5; color: white !important; border-color: #4338ca; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); transform: scale(1.05); }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen text-slate-900 pb-20">

    <nav class="bg-slate-900 text-white px-6 py-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-[1600px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg"><i class="fa-solid fa-screwdriver-wrench text-xl"></i></div>
                <div>
                    <h1 class="text-xl font-black italic tracking-tighter leading-none uppercase">Stark Command</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="flex h-2 w-2">
                            <span id="pulse-dot" class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span>
                        <p id="conn-status" class="text-[9px] text-indigo-300 font-bold uppercase tracking-widest">Satellite Link: Active</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="setView('dashboard')" id="nav-dashboard" class="px-5 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-lg">Dashboard</button>
                <button onclick="setView('body')" id="nav-body" class="px-5 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all text-slate-400 hover:text-white">Body Shop</button>
                <button onclick="fetchData()" class="bg-slate-800 p-2 rounded-xl text-slate-400 hover:text-white transition-all ml-2" title="Manual Sync"><i class="fa-solid fa-rotate" id="refresh-icon"></i></button>
            </div>
        </div>
    </nav>

    <!-- Stage Bar -->
    <div class="bg-white border-b border-slate-200 sticky top-[68px] z-40 overflow-x-auto shadow-sm custom-scrollbar">
        <div class="flex p-4 gap-3 max-w-[1600px] mx-auto px-6" id="stage-buttons-container"></div>
    </div>

    <main class="p-6 md:p-8 max-w-[1600px] mx-auto">
        <div id="view-dashboard" class="space-y-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-200 pb-6">
                <div>
                    <h2 id="current-stage-label" class="text-3xl font-black text-slate-800 uppercase tracking-tighter leading-none">Ready Repair</h2>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-[0.2em] mt-2 italic flex items-center gap-2">
                        Diagnostics: <span id="sync-time">Awaiting Data</span>
                    </p>
                </div>
                <div class="relative w-full md:w-80">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search Unit..." class="w-full pl-12 pr-6 py-3 bg-white border-2 border-slate-100 rounded-2xl text-sm font-bold focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 transition-all outline-none">
                </div>
            </div>

            <div id="unit-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
                <div class="col-span-full py-32 text-center text-slate-300 font-black uppercase tracking-widest text-sm">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x mb-4"></i><br>Fetching Flowchart Data...
                </div>
            </div>
        </div>

        <!-- Body Shop View -->
        <div id="view-body" class="hidden space-y-12">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="bg-white rounded-[3rem] p-10 border border-slate-200 shadow-sm relative overflow-hidden group">
                   <div class="relative z-10">
                     <div class="flex items-center justify-between mb-10">
                        <h3 class="text-2xl font-black text-slate-800 flex items-center gap-4">
                          <div class="p-3 bg-amber-500 rounded-2xl text-white shadow-xl shadow-amber-100"><i class="fa-solid fa-truck-fast"></i></div>
                          TO BODY SHOP
                        </h3>
                        <span id="count-to-body" class="bg-amber-50 text-amber-600 px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest border border-amber-100 italic">0 Units</span>
                     </div>
                     <div id="list-to-body" class="space-y-6"></div>
                   </div>
                </div>
                <div class="bg-white rounded-[3rem] p-10 border border-slate-200 shadow-sm ring-8 ring-indigo-50/50 relative overflow-hidden">
                   <div class="relative z-10">
                     <div class="flex items-center justify-between mb-10">
                        <h3 class="text-2xl font-black text-slate-800 flex items-center gap-4">
                          <div class="p-3 bg-indigo-600 rounded-2xl text-white shadow-xl shadow-indigo-100"><i class="fa-solid fa-house-circle-check"></i></div>
                          READY HOME
                        </h3>
                        <span id="count-from-body" class="bg-indigo-50 text-indigo-700 px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest border border-indigo-100 italic">0 Units</span>
                     </div>
                     <div id="list-from-body" class="space-y-6"></div>
                   </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CORE CONFIG
        // Note: Make sure your Sheet is published as "Comma-separated values (.csv)"
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBs1taJgcvNi-mWtsYo3E6bbby0kzHAjrtlCCWv_3A8VyJr1NZutRIFcj1UXZdBdcUE94KJEfYvUaY/pub?output=csv"; 

        let vehicles = [];
        let currentStage = 'ready_repair';
        let activeView = 'dashboard';
        let searchTerm = '';

        const stages = [
            { id: 'ins_review', label: 'Ins. Review', icon: 'fa-file-invoice' },
            { id: 'supplement', label: 'Supplement', icon: 'fa-circle-exclamation' },
            { id: 'wait_approval', label: 'Wait Approval', icon: 'fa-hourglass-half' },
            { id: 'need_drop', label: 'Need Drop (ETA)', icon: 'fa-truck-ramp-box' },
            { id: 'ready_repair', label: 'Ready Repair', icon: 'fa-circle-check' },
            { id: 'in_repair', label: 'In Repair', icon: 'fa-wrench' },
            { id: 'need_glass', label: 'Need Glass', icon: 'fa-droplet' },
            { id: 'verify', label: 'Verification', icon: 'fa-clipboard-check' },
            { id: 'complete', label: 'Complete', icon: 'fa-flag-checkered' },
            { id: 'paid', label: 'Paid', icon: 'fa-dollar-sign' },
        ];

        async function fetchData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('fa-spin');
            
            try {
                const response = await fetch(SHEET_CSV_URL + "&cache_bust=" + Date.now());
                const text = await response.text();
                
                // Robust CSV Parser
                const rows = text.split(/\r?\n/).map(line => {
                    const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
                });

                // Filter out non-RO rows
                const dataRows = rows.filter(r => r.length > 5 && r[0] && r[0] !== "RO" && !isNaN(parseInt(r[0])));

                vehicles = dataRows.map(col => {
                    return {
                        ro: col[0],
                        customer: col[1] || "Unknown",
                        vehicle: col[2] || "Vehicle",
                        dropped: col[4] || "",
                        tech: col[12] || "",
                        money: { 
                            r: col[17] === "x" || col[17] === "$", 
                            s: col[18] === "x" || col[18] === "$", 
                            t: col[19] === "x" || col[19] === "$", 
                            u: col[20] === "x" || col[20] === "$" 
                        },
                        glass: { k: col[10] || "", l: col[11] || "" },
                        body: { in: col[14] || "", out: col[15] || "" },
                        paid: col[21] || "",
                        status: determineStage(col)
                    };
                });

                document.getElementById('sync-time').innerText = "Last Sync: " + new Date().toLocaleTimeString();
                render();
            } catch (e) {
                console.error("Link Failed", e);
                document.getElementById('conn-status').innerText = "Link Offline";
                document.getElementById('conn-status').classList.replace('text-indigo-300', 'text-red-500');
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function determineStage(col) {
            // Clean up the columns
            const ro = col[0];
            const dropped = col[4]?.toString().trim() || "";
            const tech = col[12]?.toString().trim() || "";
            const bodyIn = col[14]?.toString().trim() || "";
            const bodyOut = col[15]?.toString().trim() || "";
            const paid = col[21]?.toString().trim() || "";
            
            const r = col[17], s = col[18], t = col[19], u = col[20];
            const isMoneyClear = (r === "x" || r === "$") && (s === "x" || s === "$") && (t === "x" || t === "$") && (u === "x" || u === "$");

            // STAGE LOGIC (Jason Standard)
            if (paid === "x" || paid === "$") return 'paid';
            
            // Verification: Car is ready to come home from body shop (Column P has a date/text)
            if (bodyOut && bodyOut.length > 1 && bodyOut.toLowerCase() !== 'x') return 'verify';
            
            // Body Stall: Car is currently at the body shop (Column O has a date/text)
            if (bodyIn && bodyIn.length > 1 && bodyIn.toLowerCase() !== 'x') return 'in_repair'; 
            
            // Glass: Dropped, but missing glass "x" in K or L
            const needsGlass = (col[10] && col[10].toLowerCase() !== "x") || (col[11] && col[11].toLowerCase() !== "x");
            if (dropped && !dropped.includes("ETA") && needsGlass) return 'need_glass';

            // In Repair: Tech assigned and not on HOLD
            if (tech && tech !== "HOLD" && tech !== "x" && !dropped.includes("ETA")) return 'in_repair';
            
            // Supplement: Tech is on HOLD
            if (tech === "HOLD") return 'supplement';
            
            // Need Drop: Row has an ETA in Column E
            if (dropped.includes("ETA")) return 'need_drop';
            
            // Ready Repair: Dropped, Money All Clear, No Tech Assigned
            if (dropped && !dropped.includes("ETA") && isMoneyClear && (!tech || tech === "x")) return 'ready_repair';
            
            // Wait Approval: Dropped, but one of the money dots is missing
            if (dropped && !dropped.includes("ETA") && !isMoneyClear) return 'wait_approval';
            
            return 'ins_review';
        }

        window.filterByStage = (id) => { currentStage = id; activeView = 'dashboard'; render(); };
        window.setView = (view) => { activeView = view; render(); };
        window.handleSearch = () => { searchTerm = document.getElementById('search-input').value.toLowerCase(); render(); };

        function render() {
            const isDash = activeView === 'dashboard';
            document.getElementById('nav-dashboard').className = isDash ? 'px-5 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-lg' : 'px-5 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all text-slate-400 hover:text-white';
            document.getElementById('nav-body').className = !isDash ? 'px-5 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-lg' : 'px-5 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all text-slate-400 hover:text-white';
            document.getElementById('view-dashboard').style.display = isDash ? 'block' : 'none';
            document.getElementById('view-body').style.display = !isDash ? 'block' : 'none';

            const btnContainer = document.getElementById('stage-buttons-container');
            btnContainer.innerHTML = stages.map(s => {
                const count = vehicles.filter(v => v.status === s.id).length;
                const isActive = currentStage === s.id;
                return `
                    <button onclick="filterByStage('${s.id}')" class="stage-btn flex flex-col items-center min-w-[110px] p-3 rounded-2xl bg-white border-slate-100 text-slate-400 hover:border-indigo-200 ${isActive ? 'active' : ''}">
                        <i class="fa-solid ${s.icon} text-lg mb-2"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">${s.label}</span>
                        <span class="text-[10px] font-bold mt-1 px-2 rounded-full ${isActive ? 'bg-indigo-500 text-white' : 'bg-slate-100 text-slate-500'}">${count}</span>
                    </button>
                `;
            }).join('');

            if (isDash) {
                document.getElementById('current-stage-label').innerText = stages.find(s => s.id === currentStage).label;
                const filtered = vehicles.filter(v => (v.status === currentStage) && (v.customer?.toLowerCase().includes(searchTerm) || v.ro?.toString().includes(searchTerm)));
                const grid = document.getElementById('unit-grid');
                
                if (filtered.length === 0) {
                    grid.innerHTML = `<div class="col-span-full py-32 text-center text-slate-300 font-black uppercase tracking-widest text-xs italic opacity-40">No Units Detected In This Stage</div>`;
                } else {
                    grid.innerHTML = filtered.map(v => `
                        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 stark-card">
                            <div class="flex justify-between items-start mb-6">
                                <span class="bg-slate-900 text-white text-[10px] font-black px-4 py-1.5 rounded-xl tracking-widest uppercase shadow-lg shadow-slate-200">RO #${v.ro}</span>
                                <div class="flex gap-1.5">
                                    <div class="w-3 h-3 rounded-full border-2 border-white shadow-sm ${v.money.r ? 'bg-emerald-500' : 'bg-slate-200'}"></div>
                                    <div class="w-3 h-3 rounded-full border-2 border-white shadow-sm ${v.money.s ? 'bg-emerald-500' : 'bg-slate-200'}"></div>
                                    <div class="w-3 h-3 rounded-full border-2 border-white shadow-sm ${v.money.t ? 'bg-emerald-500' : 'bg-slate-200'}"></div>
                                    <div class="w-3 h-3 rounded-full border-2 border-white shadow-sm ${v.money.u ? 'bg-emerald-500' : 'bg-slate-200'}"></div>
                                </div>
                            </div>
                            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tighter leading-tight mb-1">${v.customer}</h3>
                            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-6 pb-4 border-b border-slate-50">${v.vehicle}</p>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-slate-400">
                                    <span>Status Date</span>
                                    <span class="${v.dropped?.startsWith('ETA') ? 'text-amber-500' : 'text-slate-600'} font-bold">${v.dropped || '---'}</span>
                                </div>
                                <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-slate-400">
                                    <span>Lead Tech</span>
                                    <span class="text-indigo-600 font-black uppercase italic">${v.tech || '---'}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } else {
                const toBody = vehicles.filter(v => v.status === 'in_repair' && v.body.in);
                const fromBody = vehicles.filter(v => v.status === 'verify');
                
                document.getElementById('count-to-body').innerText = `${toBody.length} Units Out`;
                document.getElementById('count-from-body').innerText = `${fromBody.length} Inbound`;
                
                document.getElementById('list-to-body').innerHTML = toBody.map(v => `<div class="flex items-center justify-between p-6 bg-slate-50 rounded-[2rem] border border-slate-100 stark-card"><div><p class="font-black text-slate-800 text-lg uppercase tracking-tight leading-none mb-1">${v.customer}</p><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">RO ${v.ro} • ${v.vehicle}</p></div><div class="text-right"><p class="text-[9px] font-black text-amber-500 uppercase tracking-[0.2em] mb-1">Departure</p><p class="text-sm font-black text-slate-700">${v.body.in}</p></div></div>`).join('') || '<div class="py-12 text-center text-slate-300 font-black uppercase text-[10px] tracking-widest opacity-40">Area Clear</div>';
                document.getElementById('list-from-body').innerHTML = fromBody.map(v => `<div class="flex items-center justify-between p-6 bg-indigo-50/30 rounded-[2rem] border border-indigo-100 stark-card"><div><p class="font-black text-indigo-900 text-lg uppercase tracking-tight leading-none mb-1">${v.customer}</p><p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">RO ${v.ro} • ${v.vehicle}</p></div><div class="text-right"><p class="text-[9px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-1">Return Wrap</p><p class="text-sm font-black text-indigo-700">${v.body.out}</p></div></div>`).join('') || '<div class="py-12 text-center text-slate-300 font-black uppercase text-[10px] tracking-widest opacity-40">No Units Returning</div>';
            }
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
